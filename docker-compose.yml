version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: football_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_setup.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
